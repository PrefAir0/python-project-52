{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Удаление метки</h1>
<p>Вы уверены, что хотите удалить метку "{{ label.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'labels:index' %}" class="btn btn-outline-secondary">Отмена</a>
</form>
{% endblock %}
