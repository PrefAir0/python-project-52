{% extends "base.html" %}
{% load i18n %}
{% load django_bootstrap5 %}

{% block content %}
    <h1 class="my-4">{% translate "Изменение пользователя" %}</h1>
    
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" class="btn btn-primary">{% translate "Изменить" %}</button>
    </form>
{% endblock %}
