{% extends "base.html" %}
{% load i18n %}

{% block content %}
<h1 class="my-4">{% translate "Удаление пользователя" %}</h1>

<p>{% translate "Вы уверены, что хотите удалить" %} {{ user.username }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">{% translate "Да, удалить" %}</button>
</form>
{% endblock %}
